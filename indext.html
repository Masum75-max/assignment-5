<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Apply Google Font -->
    <style>
        body{
            font-family: 'Poppins', sans-serif;
        }
    </style>

</head>

<body class="flex items-center justify-center min-h-screen">
    <div class="w-3/4 mx-auto   bg-gray-50 rounded-md flex flex-col gap-3 justify-center items-center shadow-lg px-4 md:w-2/4 lg:w-1/4">
        
        <div id="logo" class="flex flex-col gap-3 items-center">
            <img class="h-20 w-20" src="./assets/github-logo.png">
            <p class="font-bold text-lg">Github Issues Tracker</p>
            <p class="text-slate-400">Sign in to manage your issues</p>

        </div>
        <label for="username" class="font-bold self-start">Username :</label>
        <input id="username" type="text" placeholder="Enter Your Name" class="self-start px-3 py-3 rounded-lg w-full">
        <label for="password" class="font-bold self-start">Password :</label>
        <input id="password" type="password" placeholder="Enter the Password" class="self-start px-3 py-3 rounded-lg w-full">
        <button id="login-btn" class="btn btn-primary w-full text-white font-bold mb-10">Sign In</button>
        <div class="flex flex-col text-gray-500 text-center mb-5">
            <span>Default</span>
            <p>Username :admin</p>
            <p>Password :admin1234</p>
        </div>
    </div>
    
      <script src="./script/index.js"></script>
</body>
</html>
